          hippostdpubwf:lastModifiedBy: ''
          hippotranslation:id: document-type-locale-id
          hippotranslation:locale: document-type-locale
          jcr:mixinTypes: ['mix:referenceable']
          visitscotland:title: ''
          jcr:uuid: 298e90e5-f226-4906-934d-ddfb804de03b
          hippostdpubwf:lastModificationDate: 2019-12-05T15:29:52.785Z
          hippostdpubwf:creationDate: 2019-12-05T15:29:52.785Z
          visitscotland:transports: []
          visitscotland:translation: ''
          /visitscotland:introduction:
            jcr:primaryType: hippostd:html
            hippostd:content: ''
          /visitscotland:mapLink:
            jcr:primaryType: visitscotland:ExternalLink
            visitscotland:label: ''
            visitscotland:link: ''
          /visitscotland:ctaLink:
            jcr:primaryType: visitscotland:ExternalLink
            visitscotland:label: ''
            visitscotland:link: ''
      /editor:templates:
        jcr:primaryType: editor:templateset
        /_default_:
          jcr:primaryType: frontend:plugincluster
          frontend:properties: [mode]
          frontend:references: [wicket.model, model.compareTo, engine, validator.id]
          frontend:services: [wicket.id, validator.id]
          /root:
            jcr:primaryType: frontend:plugin
            item: ${cluster.id}.field
            plugin.class: org.hippoecm.frontend.service.render.ListViewPlugin
          /title:
            jcr:primaryType: frontend:plugin
            caption: Heading
            field: title
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: ''
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /media:
            jcr:primaryType: frontend:plugin
            caption: Media
            compoundList: hippogallerypicker:imagelink,visitscotland:VideoLink
            contentPickerType: links
            field: media
            plugin.class: org.onehippo.forge.contentblocks.ContentBlocksFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: ''
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              compoundNamesMaxLength: 90
              maxitems: 1
              showCompoundNames: false
              showTitles: false
              startCollapsed: false
              titleMapping: []
          /introduction:
            jcr:primaryType: frontend:plugin
            caption: Copy
            field: introduction
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: Max length suggestion is 2500.
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              ckeditor.config.overlayed.json: '{disallowedContent: ''p[align]'',  stylesSet:
                ''article:./vs_styles.js'',  toolbarGroups: [ { name: ''basicstyles''},{name:
                ''styles''},{name:''listindentalign'',groups:[''list'']}, {name:''links''},{name:''insert''},{name:''clipboard''},{name:''tools''},{name:''undo''}
                ] , removeButtons: ''PickImage,Youtube,Table,Bold,Underline,Strike,Subscript,Superscript''}'
              ckeditor.config.appended.json: '{extraPlugins: ''wordcount'',   wordcount:
                {countSpacesAsChars: true, showCharCount: true, maxCharCount: 4000}}'
          /ctaLink:
            jcr:primaryType: frontend:plugin
            caption: CTA Link
            field: ctaLink
            hint: ''
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /mapLink:
            jcr:primaryType: frontend:plugin
            caption: Google Maps Day Location Link
            field: mapLink
            plugin.class: org.hippoecm.frontend.editor.plugins.field.NodeFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: ''
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /stops:
            jcr:primaryType: frontend:plugin
            caption: Stops (Deprecated)
            compoundList: hippo:mirror
            contentPickerType: links
            field: stops
            plugin.class: org.onehippo.forge.contentblocks.ContentBlocksFieldPlugin
            wicket.id: ${cluster.id}.field
            hint: ''
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
          /transports:
            jcr:primaryType: frontend:plugin
            caption: Transports
            field: transports
            multiselect.type: checkboxes
            palette.alloworder: false
            palette.maxrows: '10'
            plugin.class: org.onehippo.forge.selection.frontend.plugin.DynamicMultiSelectPlugin
            selectlist.maxrows: '10'
            valuelist.provider: service.valuelist.default
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              source: /content/documents/administration/options/transports
          /translation:
            jcr:primaryType: frontend:plugin
            caption: Translation
            field: translation
            hint: ''
            plugin.class: org.hippoecm.frontend.editor.plugins.field.PropertyFieldPlugin
            wicket.id: ${cluster.id}.field
            /cluster.options:
              jcr:primaryType: frontend:pluginconfig
              ui.extension: translationDiff
