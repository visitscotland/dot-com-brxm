                <p>The article component should be used when there is significant amount of content to display about a particular topic. Within an article, the content can be split up into multiple sections which can have a sidebar containing an image and/or a quote.</p>

                <p>Multiple articles can be used on a page to help break lots of content up into bigger parts or topics. Each article must have a title and can include optional introduction text and cover image.</p>
        /faq:
